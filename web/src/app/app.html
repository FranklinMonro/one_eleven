<mat-toolbar>
  <mat-toolbar-row>
    <h2 class="toolbar-script">One Eleven Assessment</h2>
    <span class="toolbar-spacer"></span>
    <img src="one_eleven.png" alt="" srcset="">
  </mat-toolbar-row>
</mat-toolbar>

<div class="card-container">
  <mat-card appearance="outlined" class="centered-card">
    <mat-card-header>
      <mat-card-title class="card-title">Word Check</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>
        <mat-form-field appearance="outline">
          <mat-label>Word</mat-label>
          <input matInput placeholder="Placeholder">
        </mat-form-field>
      </p>
      <p>
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput placeholder="Placeholder">
        </mat-form-field>
      </p>
    </mat-card-content>
    <mat-card-actions>
      <button matButton>Learn More</button>
    </mat-card-actions>
  </mat-card>
</div>
